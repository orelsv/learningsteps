apiVersion: apps/v1
kind: Deployment
metadata:
  name: learningsteps-api
  namespace: learningsteps
  labels:
    app: learningsteps-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learningsteps-api
  template:
    metadata:
      labels:
        app: learningsteps-api
    spec:
      containers:
        - name: learningsteps-api
          image: learningstepsacr.azurecr.io/learningsteps-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: learningsteps-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
