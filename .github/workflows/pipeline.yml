name: Build, Scan and Deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: learningsteps-api

jobs:

  build-and-scan:
    name: Build, Scan & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan Terraform with tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infra-terraform
          soft_fail: true

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Login to ACR
        run: az acr login --name learningstepsacr

      - name: Push image to ACR
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group learningsteps-rg \
            --name learningsteps-aks \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/learningsteps-api \
            learningsteps-api=${{ secrets.ACR_LOGIN_SERVER }}/learningsteps-api:${{ github.sha }} || \
          echo "Deployment not found yet - will be created via manifests"

      - name: Verify
        run: kubectl get pods -l app=learningsteps-api || echo "No pods yet"
